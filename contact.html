<!DOCTYPE html>

<html lang="en" data-theme="dark">

    <head>
        <meta charset="UTF-8">

        <title> Nick Gazis - Contact </title>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

        <!-- Style Linking -->
        <link rel="stylesheet" href="style.css">
        
        <!-- Favicons -->
        <link rel="icon" type="image/ico" sizes="32x32" href="favicons/favicon-big.ico">
        <link rel="icon" type="image/ico" sizes="16x16" href="favicons/favicon-small.ico">
    </head>

    <body>
        <header>
            <div class="container">
                <nav>
                    <div class="name">
                        <div class="ng-logo"><span>N</span>G</div>
                        <a href="index.html"><span>Nick</span> Gazis</a>
                    </div>
                    <ul id="nav-links">
                        <li><a href="index.html">About</a></li>
                        <li><a href="work.html">Work</a></li>
                        <li><a href="contact.html" class="active">Contact</a></li>
                    </ul>
                    <div class="nav-right">
                        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                            <ion-icon name="moon"></ion-icon>
                        </button>
                        <button class="burger" id="burger" aria-label="Toggle navigation">&#9776;</button>
                    </div>
                </nav>
            </div>
        </header>

        <section class="contact">
            <div class="container">
                <div class="contact-hero">
                    <h1>Contact Me</h1>
                    <p>Feel free to reach out through any of the platforms below.</p>
                </div>
                <div class="contact-bubbles">
                    <a href="https://github.com/NikolaosGazis" target="_blank" rel="noopener noreferrer" class="contact-bubble">
                        <div class="bubble-icon">
                            <ion-icon name="logo-github"></ion-icon>
                        </div>
                        <span>GitHub</span>
                    </a>
                    <a href="https://www.linkedin.com/in/Nick-gazis-b258b5263/" target="_blank" rel="noopener noreferrer" class="contact-bubble">
                        <div class="bubble-icon">
                            <ion-icon name="logo-linkedin"></ion-icon>
                        </div>
                        <span>LinkedIn</span>
                    </a>
                    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=Nickgazis3008@gmail.com" target="_blank" rel="noopener noreferrer" class="contact-bubble">
                        <div class="bubble-icon">
                            <ion-icon name="mail"></ion-icon>
                        </div>
                        <span>Gmail</span>
                    </a>
                    <div class="contact-bubble" onclick="copyDiscord()" style="cursor: pointer;">
                        <div class="bubble-icon">
                            <ion-icon name="logo-discord"></ion-icon>
                        </div>
                        <span>Discord</span>
                        <small>NTQ13</small>
                    </div>
                    <a href="https://www.instagram.com/nikos_gazis13/" target="_blank" rel="noopener noreferrer" class="contact-bubble">
                        <div class="bubble-icon">
                            <ion-icon name="logo-instagram"></ion-icon>
                        </div>
                        <span>Instagram</span>
                    </a>
                    <a href="https://www.facebook.com/nikos.gazis.564/" target="_blank" rel="noopener noreferrer" class="contact-bubble">
                        <div class="bubble-icon">
                            <ion-icon name="logo-facebook"></ion-icon>
                        </div>
                        <span>Facebook</span>
                    </a>
                </div>

                <footer>
                    <p class="ftext">©2026 Nick Gazis. All rights reserved.</p>
                </footer>
            </div>
        </section>

        <div class="toast" id="toast"></div>

        <!-- Import Icons Module -->
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
        
        <!-- Scripts -->
        <script>
            const burger = document.getElementById('burger');
            const navLinks = document.getElementById('nav-links');
            burger.addEventListener('click', () => {
                navLinks.classList.toggle('open');
            });

            // Nav shrink on scroll //
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY > 50);
            });

            // Page transitions //
            document.querySelectorAll('a[href]').forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('mailto') && !href.startsWith('#') && link.getAttribute('target') !== '_blank') {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => window.location.href = href, 150);
                    });
                }
            });

            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = themeToggle.querySelector('ion-icon');
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                themeIcon.setAttribute('name', theme === 'dark' ? 'sunny' : 'moon');
                localStorage.setItem('theme', theme);
            }
            applyTheme(localStorage.getItem('theme') || 'dark');
            themeToggle.addEventListener('click', () => {
                applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            });

            // Staggered fade-in for contact bubbles //
            document.querySelectorAll('.contact-bubble').forEach((el, i) => {
                el.style.opacity = '0';
                el.style.animation = `fadeInUp 0.5s ease ${i * 0.1 + 0.1}s forwards`;
            });

            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }

            function copyDiscord() {
                navigator.clipboard.writeText('NTQ13').then(() => showToast('Discord username copied!'));
            }

        </script>
    </body>

</html>
