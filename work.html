<!DOCTYPE html>

<html lang="en" data-theme="dark">

    <head>
        <meta charset="UTF-8">
        <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="author" content="Nick Gazis">
        <meta name="description" content="Nick Gazis - Work & Projects. Portfolio of software development projects.">
        <meta name="theme-color" content="#222222">
        <title> Nick Gazis - Work </title>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

        <!-- Style Linking -->
        <link rel="stylesheet" href="style.css">

        <!-- Favicons -->
        <link rel="icon" type="image/ico" sizes="32x32" href="favicons/favicon-big.ico">
        <link rel="icon" type="image/ico" sizes="16x16" href="favicons/favicon-small.ico">
    </head>

    <body>
        <header>
            <div class="container">
                <nav>
                    <div class="name">
                        <div class="ng-logo"><span>N</span>G</div>
                        <a href="index.html"><span>Nick</span> Gazis</a>
                    </div>
                    <ul id="nav-links">
                        <li><a href="index.html">About</a></li>
                        <li><a href="work.html" class="active">Work</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                    <div class="nav-right">
                        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                            <ion-icon name="moon"></ion-icon>
                        </button>
                        <button class="burger" id="burger" aria-label="Toggle navigation">&#9776;</button>
                    </div>
                </nav>
            </div>
        </header>

        <section class="work">
            <div class="container">
                <div class="work-hero">
                    <h1>My Work</h1>
                    <p>A snapshot of my GitHub activity and most-used languages.</p>
                </div>

                <div class="github-stats-section">
                    <h3>GitHub Stats</h3>
                    <img class="activity-graph" src="https://streak-stats.demolab.com/?user=NikolaosGazis&background=222222&border=3b3b3b&stroke=3b3b3b&ring=00468b&fire=00468b&currStreakLabel=00468b&sideLabels=c3c3c3&dates=c3c3c3&currStreakNum=ffffff&sideNums=ffffff&border_radius=10" alt="GitHub Streak" />
                    <div class="github-cards">
                        <img src="https://github-readme-stats.vercel.app/api?username=NikolaosGazis&show_icons=true&bg_color=222222&title_color=00468b&text_color=c3c3c3&icon_color=00468b&border_color=3b3b3b&border_radius=10&rank_icon=github" alt="Nick's GitHub Stats" />
                        <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=NikolaosGazis&layout=compact&bg_color=222222&title_color=00468b&text_color=c3c3c3&border_color=3b3b3b&border_radius=10" alt="Top Languages" />
                    </div>
                </div>

                <footer>
                    <p class="ftext">©2026 Nick Gazis. All rights reserved.</p>
                </footer>
            </div>
        </section>

        <!-- Import Icons Module -->
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
        <!-- Scripts -->
        <script>
            const burger = document.getElementById('burger');
            const navLinks = document.getElementById('nav-links');
            burger.addEventListener('click', () => {
                navLinks.classList.toggle('open');
            });

            // Nav shrink on scroll //
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY > 50);
            });

            // Page transitions //
            document.querySelectorAll('a[href]').forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('mailto') && !href.startsWith('#') && link.getAttribute('target') !== '_blank') {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        document.body.classList.add('fade-out');
                        setTimeout(() => window.location.href = href, 150);
                    });
                }
            });

            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = themeToggle.querySelector('ion-icon');
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                themeIcon.setAttribute('name', theme === 'dark' ? 'sunny' : 'moon');
                localStorage.setItem('theme', theme);
            }
            applyTheme(localStorage.getItem('theme') || 'dark');
            themeToggle.addEventListener('click', () => {
                applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            });
        </script>
    </body>

</html>
